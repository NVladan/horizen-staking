# Reverse proxy for the Horizen staking demo (HTTP on the server IP).
# Install to /etc/nginx/sites-available/horizen and symlink into sites-enabled.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;            # responds on the bare IP / any host

    # Don't leak the nginx version
    server_tokens off;

    # Serve static assets directly (faster than proxying to gunicorn)
    location /static/ {
        alias /opt/horizen-staking/horizen_staking/static/;
        expires 1h;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
